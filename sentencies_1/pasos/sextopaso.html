<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Pilota controlada només amb fletxes</title>
  <style>
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background-color: #f4f4f4; 
      font-family: Arial, sans-serif;
    }
    canvas { 
      background-color: white; 
      border: 3px solid #2c3e50; 
      border-radius: 10px; 
      box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
    }
    p {
      position: absolute;
      top: 20px;
      font-size: 18px;
      color: #2c3e50;
      text-align: center;
    }
  </style>
</head>
<body>

<p>Prem les fletxes del cursor per moure la pilota<br>
(No es mou sola)</p>

<canvas id="jocCanvas" width="600" height="400"></canvas>

<script>
  let canvas = document.getElementById("jocCanvas");
  let ctx = canvas.getContext("2d");

  // Posició inicial de la pilota
  let x = canvas.width / 2;
  let y = canvas.height / 2;
  let radi = 20;
  let velocitat = 6;   // pots canviar aquest valor per fer-la més ràpida o lenta

  // Objecte per saber quines tecles estan premudes
  let tecles = {};

  function dibuixarPilota() {
    ctx.beginPath();
    ctx.arc(x, y, radi, 0, Math.PI * 2);
    ctx.fillStyle = "#e74c3c";
    ctx.fill();
    ctx.closePath();
  }

  function actualitzar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Mou la pilota només si està premuda alguna fletxa
    if (tecles["ArrowLeft"])  x -= velocitat;
    if (tecles["ArrowRight"]) x += velocitat;
    if (tecles["ArrowUp"])    y -= velocitat;
    if (tecles["ArrowDown"])  y += velocitat;

    // Evitar que la pilota surti del canvas (col·lisió amb parets)
    if (x < radi) x = radi;
    if (x > canvas.width - radi) x = canvas.width - radi;
    if (y < radi) y = radi;
    if (y > canvas.height - radi) y = canvas.height - radi;

    dibuixarPilota();

    requestAnimationFrame(actualitzar);
  }

  // Detectar tecles premudes
  window.addEventListener("keydown", (e) => {
    tecles[e.key] = true;
  });

  // Detectar quan s'aixeca la tecla
  window.addEventListener("keyup", (e) => {
    tecles[e.key] = false;
  });

  actualitzar(); // Iniciar el joc
</script>

</body>
</html>
