<html lang="es">

<header>

        <div class="logo">Javier <span>Moya</span></div>

<main class="contacto">
    <h1>Contacto</h1>

    <p>Puedes escribirme a través del siguiente formulario:</p>

    <form class="formulario">
        <label>Nombre</label>
        <input type="text" placeholder="Tu nombre">

        <label>Email</label>
        <input type="email" placeholder="Tu correo">

        <label>Mensaje</label>
        <textarea placeholder="Escribe tu mensaje"></textarea>

        <button type="submit">Enviar</button>
    </form>
</main>
